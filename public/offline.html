<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#06091A" />
  <title>Offline — MSO Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Plus Jakarta Sans', sans-serif;
      background: #06091A; color: #fff;
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center; max-width: 320px; width: 100%;
    }
    .icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 24px;
      color: rgba(255,255,255,.5);
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.03em; }
    p  { font-size: 14px; color: rgba(255,255,255,.45); line-height: 1.7; margin-bottom: 28px; }
    button {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 50px; border-radius: 12px;
      background: #179DD0; border: none; cursor: pointer;
      font-size: 14.5px; font-weight: 700; color: #fff;
      box-shadow: 0 4px 20px rgba(23,157,208,.38);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="bi bi-wifi-off"></i></div>
    <h1>You're offline</h1>
    <p>MSO Console needs an internet connection to sync data. Check your connection and try again.</p>
    <button onclick="window.location.reload()">
      <i class="bi bi-arrow-clockwise"></i> Try again
    </button>
  </div>
</body>
</html>
